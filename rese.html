<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能航空仿真前沿技术联合研究中心 - 预约系统</title>
    <!-- 引入Tailwind CSS快速美化界面 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // 核心配置（可直接修改这里的参数）
        const CONFIG = {
            startDate: "2026-06-22",    // 开始日期
            endDate: "2026-06-26",      // 结束日期
            maxPeople: 2,               // 每节最大人数
            timeSlots: [                // 每日固定时段
                { start: "09:30", end: "12:30" },
                { start: "15:00", end: "17:30" }
            ]
        };

        // 本地存储工具（保存预约数据）
        const Storage = {
            get: () => JSON.parse(localStorage.getItem("reservation") || "{}"),
            set: (data) => localStorage.setItem("reservation", JSON.stringify(data))
        };
    </script>
</head>
<body class="bg-gray-50 min-h-screen py-8 px-4">
    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-md p-6 md:p-8">
        <!-- 标题 -->
        <h1 class="text-2xl md:text-3xl font-bold text-center text-blue-800 mb-2">
            智能航空仿真前沿技术联合研究中心
        </h1>
        <p class="text-center text-gray-600 mb-8">参观预约系统</p>

        <!-- 日期选择 -->
        <div class="mb-6">
            <label class="block font-medium mb-2 text-gray-700">选择预约日期</label>
            <select id="dateSelect" class="w-full p-3 border border-gray-300 rounded-lg"></select>
        </div>

        <!-- 可预约时段 -->
        <div class="mb-6">
            <label class="block font-medium mb-2 text-gray-700">选择预约时段（每节限2人）</label>
            <div id="timeList" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
        </div>

        <!-- 预约表单 -->
        <div id="reserveForm" class="hidden border p-5 rounded-lg bg-blue-50">
            <h3 class="font-semibold mb-4 text-blue-800">填写预约信息</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm mb-1">姓名 <span class="text-red-500">*</span></label>
                    <input id="name" type="text" class="w-full p-2 border rounded" placeholder="请输入您的姓名">
                </div>
                <div>
                    <label class="block text-sm mb-1">电子邮箱 <span class="text-red-500">*</span></label>
                    <input id="email" type="email" class="w-full p-2 border rounded" placeholder="请输入您的邮箱">
                </div>
                <button id="submitBtn" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
                    确认提交预约
                </button>
            </div>
        </div>

        <!-- 提示信息 -->
        <div id="message" class="mt-4 text-center font-medium hidden"></div>
    </div>

    <script>
        // 1. 生成日期选项
        function generateDates() {
            const select = document.getElementById('dateSelect');
            const start = new Date(CONFIG.startDate);
            const end = new Date(CONFIG.endDate);
            
            for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                const dateStr = d.toISOString().split('T')[0];
                const text = `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
                select.innerHTML += `<option value="${dateStr}">${text}</option>`;
            }
            // 初始化加载第一个日期的时段
            renderTimeSlots(CONFIG.startDate);
        }

        // 2. 生成30分钟一节的时段
        function generateTimeSlots() {
            const slots = [];
            const slotDuration = 30; // 30分钟一节
            
            CONFIG.timeSlots.forEach(range => {
                let [currH, currM] = range.start.split(':').map(Number);
                const [endH, endM] = range.end.split(':').map(Number);
                
                while (true) {
                    const current = `${currH.toString().padStart(2, '0')}:${currM.toString().padStart(2, '0')}`;
                    // 计算下一个时段
                    let nextM = currM + slotDuration;
                    let nextH = currH;
                    if (nextM >= 60) {
                        nextM -= 60;
                        nextH += 1;
                    }
                    const next = `${nextH.toString().padStart(2, '0')}:${nextM.toString().padStart(2, '0')}`;
                    
                    slots.push(`${current}~${next}`);
                    
                    // 到达结束时间则停止
                    if (nextH === endH && nextM === endM) break;
                    currH = nextH;
                    currM = nextM;
                }
            });
            return slots;
        }

        // 3. 渲染时段列表
        function renderTimeSlots(date) {
            const list = document.getElementById('timeList');
            const form = document.getElementById('reserveForm');
            const msg = document.getElementById('message');
            list.innerHTML = '';
            form.classList.add('hidden');
            msg.classList.add('hidden');

            const allSlots = generateTimeSlots();
            const records = Storage.get();

            allSlots.forEach(slot => {
                const key = `${date}_${slot}`;
                const data = records[key] || { count: 0, users: [] };
                const isFull = data.count >= CONFIG.maxPeople;
                
                const btn = document.createElement('button');
                btn.className = `p-3 rounded border transition ${
                    isFull 
                        ? 'bg-gray-100 text-gray-500 cursor-not-allowed' 
                        : 'border-blue-400 hover:bg-blue-50 text-blue-800'
                }`;
                btn.innerHTML = `${slot} <span class="text-sm">(${data.count}/${CONFIG.maxPeople})</span>`;
                
                if (!isFull) {
                    btn.onclick = () => selectTimeSlot(date, slot);
                }
                list.appendChild(btn);
            });
        }

        // 4. 选择时段
        let selectedDate = '';
        let selectedSlot = '';
        function selectTimeSlot(date, slot) {
            selectedDate = date;
            selectedSlot = slot;
            const form = document.getElementById('reserveForm');
            form.classList.remove('hidden');
            document.getElementById('name').value = '';
            document.getElementById('email').value = '';
        }

        // 5. 提交预约
        document.getElementById('submitBtn').onclick = function() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const msg = document.getElementById('message');
            msg.classList.remove('hidden');

            // 验证输入
            if (!name) {
                msg.textContent = '请输入姓名！';
                msg.className = 'mt-4 text-center font-medium text-red-500';
                return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                msg.textContent = '请输入有效的电子邮箱！';
                msg.className = 'mt-4 text-center font-medium text-red-500';
                return;
            }

            // 保存数据
            const key = `${selectedDate}_${selectedSlot}`;
            const records = Storage.get();
            const data = records[key] || { count: 0, users: [] };

            // 防名额满/重复预约
            if (data.count >= CONFIG.maxPeople) {
                msg.textContent = '该时段名额已满！';
                msg.className = 'mt-4 text-center font-medium text-red-500';
                return;
            }
            if (data.users.some(u => u.email === email)) {
                msg.textContent = '该邮箱已预约此时段，请勿重复预约！';
                msg.className = 'mt-4 text-center font-medium text-red-500';
                return;
            }

            // 更新预约数据
            data.count += 1;
            data.users.push({ name, email });
            records[key] = data;
            Storage.set(records);

            // 成功提示
            msg.textContent = `预约成功！\n日期：${selectedDate}\n时段：${selectedSlot}`;
            msg.className = 'mt-4 text-center font-medium text-green-600 whitespace-pre-line';
            // 刷新时段
            renderTimeSlots(selectedDate);
        };

        // 日期切换事件
        document.getElementById('dateSelect').onchange = function() {
            renderTimeSlots(this.value);
        };

        // 初始化页面
        window.onload = generateDates;
    </script>
</body>
</html>
